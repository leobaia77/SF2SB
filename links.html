<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SF2SB · Link Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--cream:#f9f6f0;--paper:#f2ede3;--stone:#d8d0c2;--ink:#2b2620;--mid:#6a5e52;--muted:#9a8e82;--d1:#c4513a;--d2:#c97f12;--d3:#4b7aa3;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;padding:40px 20px;}
.wrap{max-width:520px;margin:0 auto;}
h1{font-size:20px;font-weight:600;margin-bottom:4px;}
.sub{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:32px;}
.section{margin-bottom:24px;}
.label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.hint{font-size:12px;color:var(--mid);margin-bottom:8px;}
input[type="text"]{
  width:100%;padding:10px 12px;border:1.5px solid var(--stone);border-radius:6px;
  background:white;font-family:'Outfit',sans-serif;font-size:13px;color:var(--ink);
  outline:none;transition:border-color .15s;
}
input[type="text"]:focus{border-color:var(--d1);}
input[type="text"]::placeholder{color:var(--stone);}
.day-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.day-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.day-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--mid);width:100px;flex-shrink:0;}
.day-row input{flex:1;}
.live-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--d1);flex-shrink:0;position:relative;}
.live-dot::after{content:'';position:absolute;inset:-3px;border-radius:50%;background:var(--d1);opacity:.3;animation:pulse 1.8s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(.7);opacity:.3}50%{transform:scale(1.3);opacity:0}}
.divider{height:1px;background:var(--stone);margin:24px 0;}
#output-section{display:none;}
.output-box{
  background:white;border:1.5px solid var(--stone);border-radius:6px;
  padding:12px;font-family:'JetBrains Mono',monospace;font-size:11px;
  color:var(--ink);word-break:break-all;line-height:1.5;margin-bottom:12px;
  max-height:120px;overflow-y:auto;
}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;}
.btn{
  padding:8px 18px;border-radius:18px;border:none;cursor:pointer;
  font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;
  transition:opacity .15s;
}
.btn:hover{opacity:.85;}
.btn-primary{background:var(--d1);color:white;}
.btn-secondary{background:var(--paper);color:var(--ink);border:1.5px solid var(--stone);}
.btn-open{background:var(--d3);color:white;}
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:white;padding:8px 20px;border-radius:18px;
  font-size:12px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;
}
.toast.show{opacity:1;}
.saved-note{font-size:11px;color:var(--muted);margin-top:12px;font-style:italic;}
</style>
</head>
<body>
<div class="wrap">
  <h1>SF2SB Link Manager</h1>
  <div class="sub">Generate shareable links for your ride</div>

  <div class="section">
    <div class="label">Live Tracker</div>
    <div class="hint">Paste your Garmin LiveTrack share link when you start a ride</div>
    <div class="live-row">
      <div class="live-dot"></div>
      <input type="text" id="live" placeholder="https://livetrack.garmin.com/session/..." />
    </div>
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="label">Strava Activities</div>
    <div class="hint">Add Strava links after each day is done</div>
    <div class="day-row">
      <div class="day-dot" style="background:var(--d1)"></div>
      <span class="day-label">Day 1 · SF→MTY</span>
      <input type="text" id="s1" placeholder="https://strava.com/activities/..." />
    </div>
    <div class="day-row">
      <div class="day-dot" style="background:var(--d2)"></div>
      <span class="day-label">Day 2 · MTY→SLO</span>
      <input type="text" id="s2" placeholder="https://strava.com/activities/..." />
    </div>
    <div class="day-row">
      <div class="day-dot" style="background:var(--d3)"></div>
      <span class="day-label">Day 3 · SLO→SB</span>
      <input type="text" id="s3" placeholder="https://strava.com/activities/..." />
    </div>
  </div>

  <div class="divider"></div>

  <div class="btn-row">
    <button class="btn btn-primary" onclick="generate()">Generate Link</button>
    <button class="btn btn-secondary" onclick="clearAll()">Clear All</button>
  </div>

  <div id="output-section">
    <div class="divider"></div>
    <div class="label">Shareable Link</div>
    <div class="output-box" id="output"></div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="copyLink()">Copy Link</button>
      <button class="btn btn-open" onclick="openLink()">Open Page</button>
    </div>
  </div>

  <div class="saved-note" id="saved-note"></div>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
const BASE = window.location.origin + window.location.pathname.replace('links.html', 'index.html');
const KEYS = ['live', 's1', 's2', 's3'];
let generatedUrl = '';

// Load saved values from localStorage
KEYS.forEach(k => {
  const v = localStorage.getItem('sf2sb_' + k);
  if (v) document.getElementById(k).value = v;
});
updateSavedNote();

// Save on every input change
KEYS.forEach(k => {
  document.getElementById(k).addEventListener('input', () => {
    localStorage.setItem('sf2sb_' + k, document.getElementById(k).value.trim());
    updateSavedNote();
  });
});

function generate() {
  const params = new URLSearchParams();
  KEYS.forEach(k => {
    const v = document.getElementById(k).value.trim();
    if (v) params.set(k, v);
  });
  const qs = params.toString();
  generatedUrl = qs ? BASE + '?' + qs : BASE;
  document.getElementById('output').textContent = generatedUrl;
  document.getElementById('output-section').style.display = 'block';
}

function copyLink() {
  navigator.clipboard.writeText(generatedUrl).then(() => {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1500);
  });
}

function openLink() {
  window.open(generatedUrl, '_blank');
}

function clearAll() {
  KEYS.forEach(k => {
    document.getElementById(k).value = '';
    localStorage.removeItem('sf2sb_' + k);
  });
  document.getElementById('output-section').style.display = 'none';
  generatedUrl = '';
  updateSavedNote();
}

function updateSavedNote() {
  const filled = KEYS.filter(k => localStorage.getItem('sf2sb_' + k));
  const el = document.getElementById('saved-note');
  el.textContent = filled.length ? 'Your links are saved in this browser automatically.' : '';
}
</script>
</body>
</html>
